database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  dbname: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASS}"
  schema: "prq"                                # schema chứa bảng xử lý chính
  table_name: "address_cleansing_queue"
  id_column: "id"                              # cột Primary Key (mặc định 'id')
  input_column: "raw_address"                  # cột địa chỉ thô đầu vào
  ground_truth_column: ""                      # để trống nếu không có ground truth
  limit: 1000                                  # số dòng lấy để thực nghiệm (null = tất cả)
  db_batch_size: 100                           # số dòng mỗi lần commit kết quả về DB

models:
  phobert:
    enabled: true
    model_name: "vinai/phobert-base"
    result_column: "normalized_phobert"
    max_seq_length: 256
    batch_size: 32
    device: "auto"                              # auto | cuda | cpu

  siamese_mgte:
    enabled: true
    model_name: "Alibaba-NLP/gte-multilingual-base"
    result_column: "normalized_mgte"
    batch_size: 32
    device: "auto"

  llm:
    enabled: true
    model_name: "Qwen/Qwen2.5-1.5B-Instruct"  # Nhẹ hơn, tốc độ nhanh hơn
    result_column: "normalized_llm"
    use_quantization: true                      # Bật quantization để tiết kiệm RAM
    max_new_tokens: 128                         # Giảm tokens để tăng tốc
    temperature: 0.3
    device: "auto"

experiment:
  standard_addresses_schema: "prq"               # schema của bảng địa chỉ chuẩn
  standard_addresses_table: "address_cleansing_queue"
  standard_addresses_column: "raw_address"
  corpus_limit: 1000                             # Giảm corpus để tăng tốc loading
  output_report_path: "reports/experiment_report.html"
  save_csv: true
  csv_path: "reports/experiment_results.csv"
  log_level: "INFO"
