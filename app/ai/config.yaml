database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  dbname: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASS}"
  schema: "prq"                                # schema chứa bảng xử lý chính
  table_name: "address_cleansing_queue"
  id_column: "id"                              # cột Primary Key (mặc định 'id')
  input_column: "raw_address"                  # cột địa chỉ thô đầu vào
  ground_truth_column: ""                      # để trống nếu không có ground truth
  limit: 1000                                  # số dòng lấy để thực nghiệm (null = tất cả)
  db_batch_size: 100                           # số dòng mỗi lần commit kết quả về DB

models:
  phobert:
    enabled: true
    model_name: "vinai/phobert-base"
    # Local fine-tuned NER artifact (Phase 2 playbook output). Falls back to
    # vinai/phobert-base when the directory is missing. Override via env
    # NER_MODEL_ID in .env when needed.
    local_path: "models/phobert-ner-vn-playbook"
    result_column: "normalized_phobert"
    max_seq_length: 256
    batch_size: 32
    device: "auto"                              # auto | cuda | cpu

  siamese_mgte:
    enabled: true
    # Use the playbook-trained Siamese mGTE model when available; falls back
    # to the upstream Alibaba-NLP base when the directory is missing.
    model_name: "models/mgte-siamese-vn-playbook"
    result_column: "normalized_mgte"
    batch_size: 32
    device: "auto"

  llm:
    enabled: true
    model_name: "Qwen/Qwen2.5-1.5B-Instruct"
    result_column: "normalized_llm"
    use_quantization: true
    quantization_bits: 4                        # 4 hoặc 8 bit cho production
    max_new_tokens: 128
    temperature: 0.3
    device: "auto"
    target_throughput_per_min: 100

experiment:
  standard_addresses_schema: "prq"               # schema của bảng địa chỉ chuẩn
  standard_addresses_table: "address_cleansing_queue"
  standard_addresses_column: "raw_address"
  corpus_limit: 12000                            # Top-N corpus rows for Siamese encode (balance recall vs startup time)
  output_report_path: "reports/experiment_report.html"
  save_csv: true
  csv_path: "reports/experiment_results.csv"
  log_level: "INFO"
