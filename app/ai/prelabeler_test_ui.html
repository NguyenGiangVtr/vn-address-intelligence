<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PreLabeler Test Runner</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #1e2130;
    --border: #2d3148; --accent: #6c63ff; --accent2: #00d4aa;
    --pass: #00d4aa; --fail: #ff4f6a; --warn: #ffb347;
    --text: #e8eaf6; --muted: #6b7280; --label-bg: #252840;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, #1a1d27 0%, #252840 100%); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #6c63ff, #00d4aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .sub { color: var(--muted); font-size: 13px; margin-left: auto; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; min-height: 0; overflow: hidden; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .main { overflow-y: auto; overflow-x: hidden; padding: 20px; min-height: 0; }

  /* Sidebar header */
  .sidebar-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .sidebar-head input { flex: 1; background: var(--label-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
  .sidebar-head input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn { border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 14px; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
  .btn-success { background: var(--pass); color: #000; }
  .btn-success:hover { background: #00efc0; transform: translateY(-1px); }
  .btn-danger { background: transparent; border: 1px solid var(--fail); color: var(--fail); padding: 6px 10px; }
  .btn-danger:hover { background: var(--fail); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  .btn-icon { background: transparent; border: none; cursor: pointer; color: var(--muted); padding: 4px 6px; border-radius: 6px; font-size: 14px; transition: .15s; }
  .btn-icon:hover { color: var(--text); background: var(--border); }

  /* Test case list */
  .tc-list { flex: 1; overflow-y: auto; padding: 8px; }
  .tc-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all .15s; position: relative; }
  .tc-item:hover { border-color: var(--accent); transform: translateX(2px); }
  .tc-item.active { border-color: var(--accent); background: var(--label-bg); }
  .tc-item.pass { border-left: 3px solid var(--pass); }
  .tc-item.fail { border-left: 3px solid var(--fail); }
  .tc-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .tc-addr { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-pass { background: var(--pass); }
  .dot-fail { background: var(--fail); }
  .dot-none { background: var(--muted); }
  .tc-actions { position: absolute; top: 10px; right: 10px; display: none; gap: 4px; }
  .tc-item:hover .tc-actions { display: flex; }

  /* Summary bar */
  .summary { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 24px; }
  .summary-stat { text-align: center; }
  .summary-stat .num { font-size: 28px; font-weight: 800; }
  .summary-stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }

  /* Editor */
  .editor { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .editor-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--label-bg); }
  .editor-head input { flex: 1; background: transparent; border: none; font-size: 15px; font-weight: 600; color: var(--text); outline: none; }
  .editor-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .field input, .field textarea { background: var(--label-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; outline: none; transition: border .15s; font-family: inherit; resize: vertical; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }

  /* Expected labels */
  .exp-section { padding: 0 20px 20px; }
  .exp-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; font-weight: 600; }
  .exp-list { display: flex; flex-direction: column; gap: 8px; }
  .exp-row { display: grid; grid-template-columns: 100px 1fr auto; gap: 8px; align-items: center; }
  .exp-row select { background: var(--label-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; }
  .exp-row select:focus { border-color: var(--accent); }
  .exp-row input { background: var(--label-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; font-family: 'Courier New', monospace; }
  .exp-row input:focus { border-color: var(--accent); }

  /* Results */
  .result-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .result-head { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--label-bg); display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .result-body { padding: 20px; }
  .result-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
  .result-row.ok { background: rgba(0,212,170,.08); border: 1px solid rgba(0,212,170,.2); }
  .result-row.ng { background: rgba(255,79,106,.08); border: 1px solid rgba(255,79,106,.2); }
  .result-row.extra { background: rgba(255,179,71,.08); border: 1px solid rgba(255,179,71,.2); }
  .badge { display: inline-block; background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }

  /* Actual tokens */
  .actual-section { margin-top: 16px; }
  .token-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .token { background: var(--label-bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .token .badge { font-size: 10px; }

  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px; }
  .run-bar { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  /* Label colors */
  .lc-NUM { background: #e6194b; }
  .lc-STR { background: #3cb44b; }
  .lc-WDS { background: #b5a200; color: #000; }
  .lc-DST { background: #800000; }
  .lc-PRO { background: #0ea5e9; color: #000; }
  .lc-NHB { background: #469990; }
  .lc-BLD { background: #f58231; }
  .lc-POI { background: #911eb4; }
  .lc-FLR { background: #4363d8; }
  .lc-RM  { background: #f032e6; }
  .lc-PCD { background: #aaffc3; color: #000; }
</style>
</head>
<body>

<div class="header">
  <h1>⚗️ PreLabeler Test Runner</h1>
  <div class="sub" id="serverStatus">Đang kết nối...</div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <input id="searchInput" placeholder="🔍 Tìm test case..." oninput="renderList()">
      <button class="btn btn-primary" onclick="newCase()">+ Thêm</button>
    </div>
    <div class="tc-list" id="tcList"></div>
    <div class="run-bar">
      <button class="btn btn-success" style="flex:1" onclick="runAll()">▶ Run All Tests</button>
      <button class="btn btn-sm" style="background:var(--label-bg);color:var(--text)" onclick="exportCases()" title="Export JSON">⬇</button>
      <label class="btn btn-sm" style="background:var(--label-bg);color:var(--text);cursor:pointer" title="Import JSON">⬆<input type="file" accept=".json" style="display:none" onchange="importCases(event)"></label>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="summary" id="summary">
      <div class="summary-stat"><div class="num" id="sTotal">0</div><div class="lbl">Total</div></div>
      <div class="summary-stat"><div class="num" style="color:var(--pass)" id="sPass">0</div><div class="lbl">Pass</div></div>
      <div class="summary-stat"><div class="num" style="color:var(--fail)" id="sFail">0</div><div class="lbl">Fail</div></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%;background:var(--pass)"></div></div>
    </div>

    <div id="editorArea"><div class="empty">👈 Chọn hoặc tạo test case để bắt đầu</div></div>
  </div>
</div>

<script>
const API = 'http://localhost:5050/api';
const LABELS = ['NUM','STR','WDS','DST','PRO','NHB','BLD','POI','FLR','RM','PCD','ALY'];

let cases = [], activeId = null, results = {};

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${API}/testcases`);
    cases = await r.json();
    document.getElementById('serverStatus').textContent = `✅ Server online · ${cases.length} test cases`;
  } catch(e) {
    document.getElementById('serverStatus').textContent = '❌ Server offline – chạy prelabeler_test_server.py';
  }
  renderList(); updateSummary();
}

// ── List ───────────────────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const el = document.getElementById('tcList');
  const filtered = cases.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.input?.raw_address||'').toLowerCase().includes(q)
  );
  if (!filtered.length) { el.innerHTML = '<div class="empty">Không có test case</div>'; return; }
  el.innerHTML = filtered.map(c => {
    const r = results[c.id];
    const dot = r == null ? 'dot-none' : (r.passed ? 'dot-pass' : 'dot-fail');
    const cls = r == null ? '' : (r.passed ? 'pass' : 'fail');
    return `<div class="tc-item ${cls} ${activeId===c.id?'active':''}" onclick="selectCase('${c.id}')">
      <div class="tc-name">
        <span class="status-dot ${dot}"></span>
        ${esc(c.name||'Chưa đặt tên')}
        <div class="tc-actions">
          <button class="btn-icon" onclick="event.stopPropagation();dupCase('${c.id}')" title="Nhân đôi">⧉</button>
          <button class="btn-icon" style="color:var(--fail)" onclick="event.stopPropagation();delCase('${c.id}')" title="Xóa">✕</button>
        </div>
      </div>
      <div class="tc-addr">${esc(c.input?.raw_address||'')}</div>
    </div>`;
  }).join('');
}

// ── CRUD ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function newCase() {
  const c = { id: uid(), name: 'Test case mới', input: { raw_address:'', ward_name:'', district_name:'', province_name:'' }, expected: [], strict: false };
  cases.push(c); selectCase(c.id); save();
}

function dupCase(id) {
  const src = cases.find(c=>c.id===id);
  if (!src) return;
  const c = JSON.parse(JSON.stringify(src));
  c.id = uid(); c.name = (src.name||'') + ' (copy)';
  cases.push(c); selectCase(c.id); save();
}

function delCase(id) {
  if (!confirm('Xóa test case này?')) return;
  cases = cases.filter(c=>c.id!==id);
  if (activeId===id) { activeId=null; document.getElementById('editorArea').innerHTML='<div class="empty">👈 Chọn hoặc tạo test case</div>'; }
  delete results[id]; save(); renderList(); updateSummary();
}

function selectCase(id) {
  activeId = id; renderList(); renderEditor();
}

async function save() {
  try { await fetch(`${API}/testcases`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cases) }); }
  catch(e) { /* offline - còn local */ }
}

// ── Editor ─────────────────────────────────────────────────────────────────
function renderEditor() {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  const result = results[c.id];

  document.getElementById('editorArea').innerHTML = `
    <div class="editor">
      <div class="editor-head">
        <input id="tcName" value="${esc(c.name||'')}" oninput="updateField('name',this.value)" placeholder="Tên test case...">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer">
          <input type="checkbox" id="strictChk" ${c.strict?'checked':''} onchange="updateField('strict',this.checked)"> Strict mode
        </label>
        <button class="btn btn-success btn-sm" onclick="runOne()">▶ Run</button>
      </div>
      <div class="editor-body">
        <div class="field full">
          <label>Raw Address *</label>
          <input id="f_raw" value="${esc(c.input?.raw_address||'')}" oninput="updateInput('raw_address',this.value)" placeholder="54/12/5b Nguyễn Tuyển, Phường Bình Trưng Tây...">
        </div>
        <div class="field">
          <label>Ward Name</label>
          <input id="f_ward" value="${esc(c.input?.ward_name||'')}" oninput="updateInput('ward_name',this.value)" placeholder="Phường Bình Trưng Tây">
        </div>
        <div class="field">
          <label>District Name</label>
          <input id="f_dist" value="${esc(c.input?.district_name||'')}" oninput="updateInput('district_name',this.value)" placeholder="Thành phố Thủ Đức">
        </div>
        <div class="field">
          <label>Province Name</label>
          <input id="f_prov" value="${esc(c.input?.province_name||'')}" oninput="updateInput('province_name',this.value)" placeholder="Hồ Chí Minh">
        </div>
      </div>
      <div class="exp-section">
        <div class="exp-head">
          Expected Labels
          <button class="btn btn-sm btn-primary" onclick="addExp()">+ Thêm nhãn</button>
        </div>
        <div class="exp-list" id="expList">${renderExpRows(c.expected)}</div>
      </div>
    </div>
    ${result ? renderResult(result, c) : '<div class="empty" style="padding:20px;color:var(--muted)">Nhấn ▶ Run để kiểm thử</div>'}
  `;
}

function renderExpRows(expected) {
  return (expected||[]).map((e,i) => `
    <div class="exp-row">
      <select onchange="updateExp(${i},'label',this.value)">
        ${LABELS.map(l=>`<option ${e.label===l?'selected':''} value="${l}">${l}</option>`).join('')}
      </select>
      <input value="${esc(e.text||'')}" oninput="updateExp(${i},'text',this.value)" placeholder="Văn bản mong đợi..." style="font-family:monospace">
      <button class="btn btn-danger btn-sm" onclick="removeExp(${i})">✕</button>
    </div>`).join('');
}

function renderResult(result, c) {
  const icon = result.passed ? '✅' : '❌';
  const color = result.passed ? 'var(--pass)' : 'var(--fail)';
  if (result.error) {
    return `<div class="result-section"><div class="result-head" style="color:var(--fail)">${icon} Lỗi runtime</div><div class="result-body" style="color:var(--fail);font-family:monospace">${esc(result.error)}</div></div>`;
  }
  const detailRows = result.details.map(d => `
    <div class="result-row ${d.found?'ok':'ng'}">
      ${d.found?'✅':'❌'}
      <span class="badge lc-${d.expected.label}">${d.expected.label}</span>
      <span style="font-family:monospace">"${esc(d.expected.text)}"</span>
      <span style="color:var(--muted);font-size:12px">${d.found?'Tìm thấy':'Không tìm thấy'}</span>
    </div>`).join('');

  const unexpRows = (result.unexpected||[]).map(u => `
    <div class="result-row extra">
      ⚠️ <span class="badge lc-${u.label}">${u.label}</span>
      <span style="font-family:monospace">"${esc(u.text)}"</span>
      <span style="color:var(--muted);font-size:12px">Không mong đợi (strict)</span>
    </div>`).join('');

  const tokens = result.actual.map(a =>
    `<div class="token"><span class="badge lc-${a.label}">${a.label}</span>${esc(a.text)}</div>`
  ).join('');

  return `
    <div class="result-section">
      <div class="result-head" style="color:${color}">${icon} Kết quả: ${result.passed?'PASS':'FAIL'}</div>
      <div class="result-body">
        ${detailRows}${unexpRows}
        <div class="actual-section">
          <div style="font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Actual output</div>
          <div class="token-list">${tokens || '<span style="color:var(--muted)">Không có nhãn nào</span>'}</div>
        </div>
      </div>
    </div>`;
}

// ── Field updates ──────────────────────────────────────────────────────────
function updateField(key, val) {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  c[key] = val; save(); renderList();
}
function updateInput(key, val) {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  c.input[key] = val; save();
}
function addExp() {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  c.expected.push({ label:'STR', text:'' });
  document.getElementById('expList').innerHTML = renderExpRows(c.expected); save();
}
function updateExp(i, key, val) {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  c.expected[i][key] = val; save();
}
function removeExp(i) {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  c.expected.splice(i,1);
  document.getElementById('expList').innerHTML = renderExpRows(c.expected); save();
}

// ── Run ────────────────────────────────────────────────────────────────────
async function runOne() {
  const c = cases.find(x=>x.id===activeId); if (!c) return;
  try {
    const res = await fetch(`${API}/run`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ cases:[c] }) });
    const data = await res.json();
    results[c.id] = data[0];
  } catch(e) { alert('Không kết nối được server: ' + e.message); return; }
  renderEditor(); renderList(); updateSummary();
}

async function runAll() {
  const btn = event.target; btn.disabled = true; btn.textContent = '⏳ Running...';
  try {
    const res = await fetch(`${API}/run`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ cases }) });
    const data = await res.json();
    data.forEach(r => { results[r.id] = r; });
  } catch(e) { alert('Không kết nối được server: ' + e.message); }
  btn.disabled = false; btn.textContent = '▶ Run All Tests';
  if (activeId) renderEditor(); renderList(); updateSummary();
}

function updateSummary() {
  const total = cases.length;
  const ran = Object.values(results);
  const pass = ran.filter(r=>r.passed).length;
  const fail = ran.filter(r=>!r.passed).length;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sPass').textContent = pass;
  document.getElementById('sFail').textContent = fail;
  const pct = ran.length ? Math.round(pass/ran.length*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').style.background = fail > 0 ? 'var(--fail)' : 'var(--pass)';
}

// ── Import / Export ────────────────────────────────────────────────────────
function exportCases() {
  const blob = new Blob([JSON.stringify(cases, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'prelabeler_testcases.json'; a.click();
}
function importCases(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try { cases = JSON.parse(e.target.result); await save(); renderList(); updateSummary(); alert('Import thành công!'); }
    catch(err) { alert('File JSON không hợp lệ.'); }
  };
  reader.readAsText(file);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
