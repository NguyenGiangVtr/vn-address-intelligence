name: Strix Security Scan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  strix-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Check required secrets
        id: check_secrets
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$STRIX_LLM" ] || [ -z "$LLM_API_KEY" ]; then
            echo "::warning::Missing STRIX_LLM or LLM_API_KEY secrets - skipping Strix security scan"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Strix CLI
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install usestrix

      - name: Strix execution step (baseline)
        if: steps.check_secrets.outputs.skip != 'true'
        continue-on-error: true
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          strix -n --target ./app --scan-mode deep --instructions "Command Injection in FFmpeg subprocesses; XSS in VTT/SRT parsers; Path Traversal"
