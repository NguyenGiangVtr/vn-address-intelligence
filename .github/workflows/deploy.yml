name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - staging

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.resolve_env.outputs.deploy_env }}
      deploy_start_ts: ${{ steps.mark_start.outputs.deploy_start_ts }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Mark deploy start time
        id: mark_start
        shell: bash
        run: echo "deploy_start_ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy environment
        id: resolve_env
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          deploy_env="prod"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_ENV" ]; then
            deploy_env="$INPUT_ENV"
          fi
          echo "deploy_env=$deploy_env" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        run: |
          missing=0
          for key in VPS_HOST VPS_USER VPS_SSH_KEY DEPLOY_PATH SERVICE_NAME; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key for connectivity test
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          umask 177
          printf '%s\n' "$VPS_SSH_KEY" > ./deploy_key
          chmod 600 ./deploy_key
          ssh-keygen -y -f ./deploy_key > /dev/null

      - name: Verify SSH connectivity
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -i ./deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "echo SSH_OK"

      - name: Cleanup SSH key file
        if: always()
        shell: bash
        run: rm -f ./deploy_key

  package:
    runs-on: ubuntu-latest
    needs: init
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Build release tarball
        shell: bash
        run: |
          git archive --format=tar.gz --output=release.tar.gz HEAD

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: release.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [init, package]
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
      RELEASES_TO_KEEP: ${{ vars.RELEASES_TO_KEEP || '3' }}
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: .

      - name: Upload release package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "release.tar.gz"
          target: "/tmp/vnai-deploy/"

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH,SERVICE_NAME,RELEASES_TO_KEEP
          script: |
            set -euo pipefail

            RELEASES_TO_KEEP="${RELEASES_TO_KEEP:-3}"
            RELEASE_DIR="$DEPLOY_PATH/releases/$(date +%Y%m%d%H%M%S)"
            mkdir -p "$RELEASE_DIR"
            mkdir -p "$DEPLOY_PATH/releases"

            # Free space before extracting/installing by pruning old releases.
            if [ -d "$DEPLOY_PATH/releases" ]; then
              ls -1dt "$DEPLOY_PATH"/releases/* 2>/dev/null | tail -n +$((RELEASES_TO_KEEP + 1)) | xargs -r rm -rf
            fi

            tar -xzf /tmp/vnai-deploy/release.tar.gz -C "$RELEASE_DIR"

            cd "$RELEASE_DIR"
            export PIP_NO_CACHE_DIR=1
            python3 -m venv .venv
            . .venv/bin/activate
            pip install --upgrade pip
            pip install --no-cache-dir -r requirements-prod.txt

            ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"

            sudo systemctl daemon-reload
            sudo systemctl restart "$SERVICE_NAME"
            sudo systemctl is-active --quiet "$SERVICE_NAME"

            rm -f /tmp/vnai-deploy/release.tar.gz
            rm -rf /tmp/pip-*

  notify:
    runs-on: ubuntu-latest
    needs: [init, package, deploy]
    if: always()
    env:
      DEPLOY_ENV: ${{ needs.init.outputs.deploy_env }}
      DEPLOY_START_TS: ${{ needs.init.outputs.deploy_start_ts }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Notify Slack
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is empty. Skip Slack notification."
            exit 0
          fi

          NOW_TS=$(date +%s)
          START_TS="${DEPLOY_START_TS:-$NOW_TS}"
          DURATION_SEC=$((NOW_TS - START_TS))
          DURATION_MIN=$((DURATION_SEC / 60))
          DURATION_REM=$((DURATION_SEC % 60))
          DURATION_FMT="${DURATION_MIN}m ${DURATION_REM}s"

          if [ "$DEPLOY_ENV" = "prod" ]; then
            ENV_ICON=":rocket:"
          else
            ENV_ICON=":test_tube:"
          fi

          if [ "${{ needs.deploy.result }}" = "success" ]; then
            ICON="$ENV_ICON"
            STATUS_TEXT="SUCCESS"
            COLOR="#2EB67D"
          else
            ICON=":rotating_light:"
            STATUS_TEXT="FAILED"
            COLOR="#E01E5A"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TITLE="$ICON Deploy $STATUS_TEXT (${DEPLOY_ENV^^})"

          payload=$(cat <<EOF
          {
            "text": "$TITLE - ${{ github.repository }}",
            "attachments": [
              {
                "color": "$COLOR",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "$TITLE"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repository:*\\n${{ github.repository }}" },
                      { "type": "mrkdwn", "text": "*Branch:*\\n${{ github.ref_name }}" },
                      { "type": "mrkdwn", "text": "*Environment:*\\n${DEPLOY_ENV^^}" },
                      { "type": "mrkdwn", "text": "*Status:*\\n$STATUS_TEXT" },
                      { "type": "mrkdwn", "text": "*Server:*\\n$VPS_HOST" },
                      { "type": "mrkdwn", "text": "*Service:*\\n$SERVICE_NAME" },
                      { "type": "mrkdwn", "text": "*Commit SHA:*\\n\`$SHORT_SHA\`" },
                      { "type": "mrkdwn", "text": "*Duration:*\\n$DURATION_FMT" }
                    ]
                  },
                  {
                    "type": "context",
                    "elements": [
                      { "type": "mrkdwn", "text": "*Actor:* ${{ github.actor }}" }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "View Workflow Run" },
                        "url": "$RUN_URL"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST \
            -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
