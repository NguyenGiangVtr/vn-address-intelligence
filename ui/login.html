<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VN Address Intelligence</title>
    <link rel="stylesheet" href="style.css?v=202605091631">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a0b);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: rgba(22, 22, 24, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: var(--radius-md);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }
        .login-error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--danger);
            padding: 10px;
            border-radius: var(--radius-md);
            font-size: 12px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(248, 113, 113, 0.2);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo"><i class="fa-solid fa-bolt"></i></div>
            <h1 class="login-title">Welcome back</h1>
            <p class="login-subtitle">VN Address Intelligence SaaS</p>
        </div>

        <div id="error-msg" class="login-error">Invalid username or password</div>

        <div style="display:flex; gap:10px; margin-bottom:16px;">
            <button type="button" id="mode-login" class="btn btn-primary" style="flex:1; padding:10px 12px;">Sign In</button>
            <button type="button" id="mode-register" class="btn btn-outline" style="flex:1; padding:10px 12px;">Register</button>
        </div>

        <form id="login-form">
            <div class="form-group" id="display-name-group" style="display:none;">
                <label class="form-label">Display Name</label>
                <input type="text" id="display-name" class="form-input" placeholder="Your name">
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-input" placeholder="admin" required>
            </div>
            <div class="form-group" id="email-group" style="display:none;">
                <label class="form-label">Email</label>
                <div style="display:flex; gap:8px;">
                    <input type="email" id="email" class="form-input" placeholder="example@email.com" style="flex:1;">
                    <button type="button" id="send-code-btn" class="btn btn-outline" style="padding: 0 12px; font-size: 12px; white-space: nowrap;">Send Code</button>
                </div>
            </div>
            <div class="form-group" id="code-group" style="display:none;">
                <label class="form-label">Verification Code</label>
                <input type="text" id="verification-code" class="form-input" placeholder="6-digit code">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">
                Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>

        <div style="text-align:center; margin-top:14px; font-size:12px; color:var(--text-tertiary);">
            Default admin: <strong>admin</strong> / <strong>vnai@2026</strong>
        </div>

        <div style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-tertiary);">
            &copy; 2026 VN Address Intelligence. All rights reserved.
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === "localhost" || window.location.protocol === "file:"
          ? "http://localhost:8081/api"
          : "/api";

        let mode = 'login';

        const errorEl = document.getElementById('error-msg');
        const displayNameGroup = document.getElementById('display-name-group');
        const displayNameInput = document.getElementById('display-name');
        const submitBtn = document.getElementById('submit-btn');
        const loginModeBtn = document.getElementById('mode-login');
        const registerModeBtn = document.getElementById('mode-register');

        const emailGroup = document.getElementById('email-group');
        const codeGroup = document.getElementById('code-group');
        const sendCodeBtn = document.getElementById('send-code-btn');
        const emailInput = document.getElementById('email');
        const codeInput = document.getElementById('verification-code');

        function setMode(nextMode) {
            mode = nextMode;
            const isRegister = mode === 'register';
            displayNameGroup.style.display = isRegister ? 'block' : 'none';
            emailGroup.style.display = isRegister ? 'block' : 'none';
            codeGroup.style.display = isRegister ? 'block' : 'none';
            
            submitBtn.innerHTML = isRegister
              ? 'Create Account <i class="fa-solid fa-user-plus" style="margin-left: 8px;"></i>'
              : 'Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
            loginModeBtn.className = isRegister ? 'btn btn-outline' : 'btn btn-primary';
            registerModeBtn.className = isRegister ? 'btn btn-primary' : 'btn btn-outline';
            errorEl.style.display = 'none';
        }

        sendCodeBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email) {
                errorEl.textContent = 'Please enter your email first';
                errorEl.style.display = 'block';
                return;
            }

            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE}/register/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    alert('Verification code sent! Please check your email.');
                    let countdown = 60;
                    const timer = setInterval(() => {
                        countdown--;
                        sendCodeBtn.textContent = `Resend (${countdown}s)`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            sendCodeBtn.disabled = false;
                            sendCodeBtn.textContent = 'Send Code';
                        }
                    }, 1000);
                } else {
                    const err = await response.json();
                    errorEl.textContent = err.detail || 'Failed to send code';
                    errorEl.style.display = 'block';
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = 'Send Code';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error';
                errorEl.style.display = 'block';
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = 'Send Code';
            }
        });

        loginModeBtn.addEventListener('click', () => setMode('login'));
        registerModeBtn.addEventListener('click', () => setMode('register'));

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const displayName = displayNameInput.value;
            
            errorEl.style.display = 'none';

            try {
                const endpoint = mode === 'register' ? '/register' : '/login';
                let body;
                if (mode === 'register') {
                    body = JSON.stringify({ 
                        username: user, 
                        email: emailInput.value,
                        password: pass, 
                        verification_code: codeInput.value,
                        display_name: displayName 
                    });
                } else {
                    body = new URLSearchParams({ username: user, password: pass });
                }

                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: mode === 'register'
                        ? { 'Content-Type': 'application/json' }
                        : { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('vnai_token', data.access_token);
                    window.location.href = 'index.html';
                } else {
                    const errData = await response.json().catch(() => ({}));
                    console.error('Auth failed:', errData);
                    errorEl.textContent = errData.detail || (mode === 'register' ? 'Registration failed' : 'Invalid username or password');
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error('Network error:', err);
                errorEl.textContent = 'Connection error. Please check backend.';
                errorEl.style.display = 'block';
            }
        });

        setMode('login');
    </script>
</body>
</html>
