<!-- ══════ PAGE: NSO SYNC ══════ -->
<div class="page" id="nso-sync">
    <style>
        #nso-sync .dm-filter-toolbar {
            padding: 20px;
        }

        #nso-sync .batch-log {
            background: #000;
            color: #34d399;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
        }

        @media (max-width: 768px) {
            #nso-sync .dm-filter-toolbar .card-body {
                flex-direction: column;
                align-items: stretch;
            }

            #nso-sync .dm-filter-toolbar .flex.gap-12 {
                width: 100%;
            }

            #nso-sync .dm-filter-toolbar .btn {
                flex: 1;
            }
        }
    </style>

    <div class="page-header flex justify-between items-center">
        <div>
            <h2>NSO Sync</h2>
            <p>Đồng bộ dữ liệu hành chính từ Tổng cục Thống kê (NSO - GSO)</p>
        </div>
        <div class="flex gap-12">
            <button class="btn btn-primary" id="btn-nso-sync-selected">
                <i class="fa-solid fa-sync mr-4"></i> Sync Selected
            </button>
            <button class="btn btn-outline" id="btn-nso-sync-all">
                <i class="fa-solid fa-cloud-arrow-down mr-4"></i> Sync All
            </button>
        </div>
    </div>

    <!-- Filter Toolbar -->
    <div id="nso-filter-container"></div>

    <!-- Results Section -->
    <div class="card mb-12">
        <div class="card-header">
            <span class="card-title">Danh sách Đơn vị NSO</span>
            <span id="nso-count" class="badge accent">0 bản ghi</span>
        </div>
        <div class="card-body" style="padding:0">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;">Mã</th>
                            <th>Tên Đơn vị</th>
                            <th>Phân loại</th>
                            <th class="text-right" style="width: 100px;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="nso-table-body">
                        <tr>
                            <td colspan="4" class="text-center text-tertiary" style="padding: 60px;">
                                <i class="fa-solid fa-cloud-download mb-12"
                                    style="font-size: 32px; opacity: 0.2; display: block;"></i>
                                Đang tải dữ liệu từ NSO...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Logs Section -->

        <div class="card-header">

        </div>
        <div class="card-body p-12 flex flex-column">

            </button>
        </div>
    </div> -->
</div>
