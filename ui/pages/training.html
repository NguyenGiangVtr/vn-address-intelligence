<!-- ══════ PAGE: TRAINING HUB ══════ -->
<div class="page full-height-page" id="training">
    <!-- BLOCK 1: Header -->
    <div class="page-header">
        <h2>Training Hub</h2>
        <p>Tái huấn luyện mô hình PhoBERT NER với dữ liệu từ Label Studio</p>
    </div>

    <!-- BLOCK 2: Data Import Section -->
    <div class="card mb-20">
        <div class="card-body">
            <div style="display: flex; flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="flex: 1; min-width: 280px; margin-bottom: 0;">
                    <label class="form-label">Label Studio JSON Export</label>
                    <div style="display: flex; gap: 0; align-items: stretch;">
                        <input type="file" id="ls-import-file" class="form-input" accept=".json" style="border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; flex: 1;">
                        <button class="btn btn-primary" id="btn-import-ls" style="border-top-left-radius: 0; border-bottom-left-radius: 0; white-space: nowrap;">
                            <i class="fa-solid fa-upload"></i> Tải lên & Tái huấn luyện
                        </button>
                    </div>
                    <div class="text-tertiary mt-8" style="font-size: 11px;">
                        Hỗ trợ định dạng JSON của Label Studio (Export > JSON)
                    </div>
                </div>
                <div id="import-status" style="flex: 0 1 100%; font-size: 13px; text-align: center;"></div>
            </div>
        </div>
    </div>

    <!-- BLOCK 3: Model Metrics Chart -->
    <div class="card mb-20">
        <div class="card-header">
            <span class="card-title">Chỉ số mô hình qua các phiên bản</span>
        </div>
        <div class="card-body" style="display: flex; align-items: center; justify-content: center; min-height: 300px;">
            <div class="chart-container" style="height: 250px; width: 100%;">
                <canvas id="chart-training-progress"></canvas>
            </div>
        </div>
    </div>

    <!-- BLOCK 4: Training History -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">Lịch sử Tái huấn luyện</span>
            <button class="btn btn-sm btn-ghost" id="btn-training-refresh">
                <i class="fa-solid fa-sync"></i> Refresh
            </button>
        </div>
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Phiên bản</th>
                            <th>Độ chính xác (Acc)</th>
                            <th>F1-Score</th>
                            <th>Số lượng mẫu</th>
                            <th>Ngày huấn luyện</th>
                        </tr>
                    </thead>
                    <tbody id="training-history-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
