<!-- prelabeler-test.html — PreLabeler Test Suite (SaaS integrated) -->
<div class="page" id="prelabeler-test">

  <!-- ── Page Header + compact summary ── -->
  <div class="page-header plt-page-header-wrap">
    <div class="plt-header-main">
      <h2 class="page-title-inner">⚗️ PreLabeler Test Suite</h2>
      <p class="page-subtitle plt-header-sub">Quản lý và kiểm thử PreLabeler.predict()</p>
      <div id="plt-summary" class="plt-summary-band" aria-label="Tổng kết test và thao tác">
        <div class="plt-summary-metrics">
          <span class="plt-sum-item"><span id="plt-s-total">0</span> test</span>
          <span class="plt-sum-item plt-sum-pass"><i class="fa-solid fa-check"></i> <span id="plt-s-pass">0</span></span>
          <span class="plt-sum-item plt-sum-fail"><i class="fa-solid fa-xmark"></i> <span id="plt-s-fail">0</span></span>
          <div class="plt-summary-bar" title="Tỉ lệ pass (đã chạy)">
            <div id="plt-progress" class="plt-summary-bar-fill"></div>
          </div>
          <span id="plt-pct" class="plt-sum-pct">Chưa chạy</span>
        </div>
        <div class="plt-summary-actions">
          <button class="btn btn-outline" id="plt-btn-import" title="Import JSON">
            <i class="fa-solid fa-upload"></i> Import
          </button>
          <button class="btn btn-outline" id="plt-btn-export" title="Export JSON">
            <i class="fa-solid fa-download"></i> Export
          </button>
          <button class="btn btn-accent" id="plt-btn-run-all">
            <i class="fa-solid fa-play"></i> Run All
          </button>
          <input type="file" id="plt-file-input" accept=".json" style="display:none">
        </div>
      </div>
    </div>
  </div>

  <!-- ── Main Layout ── -->
  <div class="plt-main-layout">

    <!-- LEFT: Test Case List -->
    <div class="card plt-list-card">
      <div class="plt-list-toolbar">
        <input id="plt-search" class="form-input plt-search-input" placeholder="🔍 Tìm kiếm...">
        <button class="btn btn-primary" id="plt-btn-new">+ Thêm</button>
      </div>
      <div class="plt-list-body" id="plt-list">
        <div class="empty-state"><i class="fa-solid fa-vial"></i>
          <p>Chưa có test case</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: Editor + Result -->
    <div class="plt-editor-col" id="plt-editor-area">
      <div class="empty-state card plt-editor-empty">
        <i class="fa-solid fa-flask-vial"></i>
        <p>Chọn hoặc tạo test case để bắt đầu</p>
      </div>
    </div>

  </div>
</div>
