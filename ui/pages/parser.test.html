<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════
   1. TEST FRAMEWORK  (async-first, single-pass registration)
   ══════════════════════════════════════════════════════════════════ */
const _groups  = [];   // [{ name, tests:[ {name, fn} ] }]
let   _current = null;

function describe(name, bodyFn) {
  _current = { name, tests: [] };
  _groups.push(_current);
  bodyFn();              // bodyFn is SYNC — registers tests only
  _current = null;
}

function it(name, asyncFn) {
  if (!_current) throw new Error("it() called outside describe()");
  _current.tests.push({ name, fn: asyncFn });
}

/* Assertions */
function assert(cond, msg)            { if (!cond)     throw new Error(msg || "Assertion failed"); }
function assertEqual(a, b, msg)       { if (a !== b)   throw new Error(msg || `Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`); }
function assertContains(s, sub, msg)  { if (!String(s).includes(sub)) throw new Error(msg || `"${sub}" not found in: ${String(s).slice(0,120)}`); }
function assertNotContains(s, sub, msg){ if (String(s).includes(sub)) throw new Error(msg || `"${sub}" should NOT appear in: ${String(s).slice(0,120)}`); }

/* ══════════════════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════════════════
   3. PRODUCTION FUNCTIONS UNDER TEST  (exact copies from app.js?v=202605051716)
   ══════════════════════════════════════════════════════════════════ */

const _MODEL_TASK_META = {
  prelabeler: { task:"NER",       icon:"fa-tags",             taskLabel:"Trích xuất thực thể",   outputType:"entities"   },
  phobert:    { task:"Retrieval", icon:"fa-magnifying-glass", taskLabel:"Chuẩn hóa ngữ nghĩa",   outputType:"normalized" },
  mgte:       { task:"Embedding", icon:"fa-layer-group",      taskLabel:"Embedding đa ngôn ngữ", outputType:"normalized" },
  llm:        { task:"LLM",       icon:"fa-brain",            taskLabel:"Suy luận ngôn ngữ",     outputType:"normalized" },
};

function _setParserStatus(state, text) {
  const dot = document.getElementById("parser-status-dot");
  const txt = document.getElementById("parser-status");
  if (dot) dot.className = `pstatus-dot ${state}`;
  if (txt) { txt.textContent = text; txt.className = `pstatus-text ${state}`; }
}

function _resetModelCards() {
  ["prelabeler","phobert","mgte","llm"].forEach(m => {
    const card   = document.getElementById(`pcard-${m}`);
    const result = document.getElementById(`presult-${m}`);
    const stats  = document.getElementById(`pstats-${m}`);
    const badge  = document.getElementById(`pbadge-${m}`);
    if (card)   card.classList.remove("is-done","is-error");
    if (result) { result.className = "pmodel-result"; result.innerHTML = '<div class="pmodel-shimmer"></div>'; }
    if (stats)  stats.innerHTML = "";
    if (badge)  badge.innerHTML = '<span class="pmodel-spinner"></span>';
  });
  document.getElementById("parser-compare-summary")?.remove();
}

function _renderModelCard(model, out, latencyMs) {
  const card     = document.getElementById(`pcard-${model}`);
  const resultEl = document.getElementById(`presult-${model}`);
  const statsEl  = document.getElementById(`pstats-${model}`);
  const badgeEl  = document.getElementById(`pbadge-${model}`);
  if (!card) return;
  const taskMeta = _MODEL_TASK_META[model] || {};
  card.classList.add("is-done");
  if (badgeEl) badgeEl.innerHTML = `<span class="pmodel-badge-done success">DONE</span>`;
  if (resultEl) {
    resultEl.classList.add("has-result");
    if (!out) {
      resultEl.innerHTML = `<span class="no-result">Không có kết quả</span>`;
    } else if (out.error && !out.normalizedAddress && !Array.isArray(out.result)) {
      const isNotLoaded = out.status === "Not loaded";
      resultEl.innerHTML = `<div class="pmodel-not-loaded">
        <span>${isNotLoaded ? "Model chưa được nạp vào bộ nhớ" : escapeHtml(out.error)}</span>
      </div>`;
    } else {
      const normalized = out.normalizedAddress || "";
      const entities   = Array.isArray(out.result) ? out.result : [];
      const labelInfo  = {};
      NER_LABELS.forEach(l => labelInfo[l.value] = l);
      let html = "";
      if (taskMeta.taskLabel)
        html += `<div class="pmodel-task-badge">${taskMeta.taskLabel}</div>`;
      if (normalized)
        html += `<span class="pmodel-normalized">${escapeHtml(normalized)}</span>`;
      if (entities.length > 0) {
        const chips = entities.slice(0, 10).map(e => {
          const lbl  = e.label || (e.value?.labels?.[0]) || "?";
          const txt  = e.text  || e.value?.text || "";
          const info = labelInfo[lbl] || { color:"#888" };
          return `<span class="pmodel-ent-chip" style="color:${info.color}">${lbl}: ${escapeHtml(txt)}</span>`;
        }).join("");
        html += `<div class="pmodel-entities">${chips}</div>`;
      }
      if (!normalized && entities.length === 0 && !out.error)
        html += `<span class="empty-result">Không tìm thấy kết quả phù hợp</span>`;
      resultEl.innerHTML = html;
    }
  }
  if (statsEl) {
    const score    = typeof out?.score       === "number" ? out.score       : null;
    const count    = Array.isArray(out?.result) ? out.result.length
                   : (typeof out?.entityCount === "number" ? out.entityCount : null);
    const modelLat = typeof out?.latencyMs   === "number" ? out.latencyMs   : null;
    let chips = `<span class="pstat-chip latency">${latencyMs}ms</span>`;
    if (modelLat !== null && modelLat !== latencyMs)
      chips += `<span class="pstat-chip latency model">${modelLat.toFixed(0)}ms</span>`;
    if (count  !== null)
      chips += `<span class="pstat-chip count">${count} entities</span>`;
    if (score  !== null)
      chips += `<span class="pstat-chip conf">${(score * 100).toFixed(1)}%</span>`;
    statsEl.innerHTML = chips;
  }
}

function _renderModelCardError(model) {
  const card     = document.getElementById(`pcard-${model}`);
  const resultEl = document.getElementById(`presult-${model}`);
  const badgeEl  = document.getElementById(`pbadge-${model}`);
  if (card)     card.classList.add("is-error");
  if (badgeEl)  badgeEl.innerHTML = `<span class="pmodel-badge-done error">ERR</span>`;
  if (resultEl) resultEl.innerHTML = `<span class="conn-err">Không thể kết nối model</span>`;
}

function _renderParserCompareSummary() {
  const grid = document.getElementById("parser-models-grid");
  if (!grid) return;
  document.getElementById("parser-compare-summary")?.remove();
  const MODEL_NAMES = { prelabeler:"PreLabeler", phobert:"PhoBERT", mgte:"mGTE", llm:"Qwen LLM" };
  const rows = ["prelabeler","phobert","mgte","llm"].map(k => {
    const resultEl    = document.getElementById(`presult-${k}`);
    const statsEl     = document.getElementById(`pstats-${k}`);
    const isError     = document.getElementById(`pcard-${k}`)?.classList.contains("is-error");
    const isNotLoaded = !!resultEl?.querySelector(".pmodel-not-loaded");
    const normEl      = resultEl?.querySelector(".pmodel-normalized");
    const entChips    = resultEl?.querySelectorAll(".pmodel-ent-chip");
    const confChip    = statsEl?.querySelector(".pstat-chip.conf");
    return { key:k, name:MODEL_NAMES[k], isError, isNotLoaded,
             normalized:  normEl?.textContent?.trim() || null,
             entityCount: entChips?.length || 0,
             confidence:  confChip?.textContent?.trim() || null };
  }).filter(r => !r.isError && !r.isNotLoaded);

  if (!rows.length) return;

  const el = document.createElement("div");
  el.id = "parser-compare-summary";
  el.className = "parser-compare-summary";
  const rowsHtml = rows.map(r => {
    const tm = _MODEL_TASK_META[r.key];
    const out = r.normalized
      ? `<span class="pcs-output normalized">${escapeHtml(r.normalized)}</span>`
      : r.entityCount > 0
        ? `<span class="pcs-output entities">${r.entityCount} thực thể</span>`
        : `<span class="pcs-output empty">—</span>`;
    const conf = r.confidence ? `<span class="pcs-conf">${r.confidence}</span>` : "";
    return `<tr>
      <td class="pcs-name">${r.name}</td>
      <td class="pcs-task">${tm?.taskLabel||""}</td>
      <td class="pcs-output-cell">${out}</td>
      <td class="pcs-conf-cell">${conf}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `
    <div class="pcs-header">So sánh kết quả các mô hình</div>
    <div class="pcs-note">Mỗi mô hình thực hiện một tác vụ khác nhau — kết quả trả về khác nhau là bình thường.</div>
    <table class="pcs-table">
      <thead><tr><th>Mô hình</th><th>Tác vụ</th><th>Kết quả</th><th>Điểm</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  grid.after(el);
}

function _buildParserNERLegend() {
  const legend = document.getElementById("parser-ner-legend");
  if (!legend) return;
  legend.innerHTML = NER_LABELS.map(l =>
    `<span class="plegend-item" style="color:${l.color}">${l.value}</span>`
  ).join("");
}

function _updateParserMeta(meta) {
  const el = document.getElementById("parser-meta");
  if (!el) return;
  const corpus = meta.corpusSize
    ? `<strong id="meta-corpus">${meta.corpusSize.toLocaleString("vi-VN")}</strong> địa chỉ trong corpus` : "";
  const note   = meta.note
    ? `<span id="meta-note">${meta.note}</span>` : "";
  el.innerHTML = [corpus, note].filter(Boolean).join("") || el.innerHTML;
}

function renderNERHighlight(entities) {
  const nerEl   = document.getElementById("parser-output");
  const inputEl = document.getElementById("parser-input");
  if (!nerEl || !inputEl) return;
  const text = inputEl.value;
  if (!entities || !Array.isArray(entities) || entities.length === 0) {
    nerEl.innerHTML = escapeHtml(text);
    return;
  }
  const norm = entities.map(e => {
    if (e.value?.labels)
      return { start:e.value.start, end:e.value.end, label:e.value.labels[0], text:e.value.text };
    return { start:e.start??0, end:e.end??0, label:e.label||"?", text:e.text||"" };
  }).filter(e => e.end > e.start);

  const sorted = [...norm].sort((a,b) => a.start - b.start);
  const filtered = [];
  sorted.forEach(e => {
    if (!filtered.length || e.start >= filtered[filtered.length-1].end) filtered.push(e);
  });

  const labelInfo = {};
  NER_LABELS.forEach(l => labelInfo[l.value] = l);

  let html = "", cursor = 0;
  filtered.forEach(e => {
    if (e.start > cursor) html += escapeHtml(text.slice(cursor, e.start));
    const info = labelInfo[e.label] || { color:"#888" };
    html += `<span class="ner-entity ner-${e.label}" data-label="${e.label}" style="color:${info.color}">${escapeHtml(text.slice(e.start, e.end))}</span>`;
    cursor = e.end;
  });
  if (cursor < text.length) html += escapeHtml(text.slice(cursor));
  nerEl.innerHTML = html;
}

async function runParser() {
  const inputEl  = document.getElementById("parser-input");
  const text     = inputEl?.value?.trim();
  const sampleId = inputEl?.dataset?.sampleId;
  if (!text) return;

  const btnParse  = document.getElementById("btn-parse");
  const heroInner = document.querySelector(".parser-hero-inner");
  const timingEl  = document.getElementById("parser-timing");
  const timingVal = document.getElementById("parser-timing-val");

  _resetModelCards();
  _setParserStatus("running", "Đang phân tích — gửi yêu cầu đến 4 model...");
  if (heroInner) heroInner.classList.add("is-running");
  if (btnParse)  { btnParse.disabled = true;  btnParse.innerHTML = "<span>Đang xử lý</span>"; }
  if (timingEl)  timingEl.style.display = "none";

  const nerOut = document.getElementById("parser-output");
  if (nerOut) nerOut.innerHTML = "<span>Đang chờ...</span>";

  const startTs = Date.now();
  const payload = sampleId ? { id: parseInt(sampleId) } : { raw_address: text };
  const MODELS  = [
    { key:"prelabeler" }, { key:"phobert" }, { key:"mgte" }, { key:"llm" },
  ];
  let completedCount = 0, firstNERDone = false, lastMeta = null;

  const fetchModel = async ({ key }) => {
    const t0 = Date.now();
    try {
      const res = await fetch(`${API_BASE}/parser/analyze?model=${key}`, {
        method: "POST",
        headers: { ...getAuthHeader(), "Content-Type":"application/json" },
        body: JSON.stringify(payload),
      });
      const latency = Date.now() - t0;
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const out  = data.outputs?.[key];
      if (data.meta) lastMeta = data.meta;
      if (data.acs && !lastMeta?._acs) { if (!lastMeta) lastMeta={}; lastMeta._acs = data.acs; }
      _renderModelCard(key, out, latency);
      if (key === "prelabeler" && !firstNERDone) {
        firstNERDone = true;
        renderNERHighlight(out?.result || []);
      }
    } catch {
      _renderModelCardError(key);
    } finally {
      completedCount++;
      _setParserStatus("running", `Đang phân tích — ${completedCount}/4 model hoàn thành...`);
    }
  };

  try {
    await Promise.all(MODELS.map(fetchModel));
    const totalMs = Date.now() - startTs;
    _setParserStatus("done", `Hoàn thành — tổng ${totalMs}ms`);
    if (timingEl && timingVal) { timingVal.textContent = `${totalMs}ms`; timingEl.style.display = "flex"; }
    if (lastMeta) _updateParserMeta(lastMeta);
    _renderParserCompareSummary();
  } catch {
    _setParserStatus("error", "Đã xảy ra lỗi trong quá trình phân tích");
  } finally {
    if (heroInner) heroInner.classList.remove("is-running");
    if (btnParse)  { btnParse.disabled = false; btnParse.innerHTML = "<span>Phân tích địa chỉ</span>"; }
  }
}

/* ══════════════════════════════════════════════════════════════════
   4. MOCK FETCH HELPERS
   ══════════════════════════════════════════════════════════════════ */
const MOCK_ENTITIES = [
  { label:"NUM", text:"123",       start:0,  end:3  },
  { label:"STR", text:"Lê Lợi",   start:4,  end:11 },
  { label:"WDS", text:"Bến Thành",start:13, end:22 },
  { label:"DST", text:"Quận 1",   start:24, end:30 },
  { label:"PRO", text:"HCM",      start:32, end:35 },
];

function mockFetch(overrides = {}) {
  const defaults = {
    prelabeler: { outputs:{ prelabeler:{ mode:"rule_based_hybrid", result:MOCK_ENTITIES, entityCount:5 } },
                  meta:{ corpusSize:10000, evaluatedAt:"2026-05-04T00:00:00Z", note:"" },
                  acs:{ acs_score:0.88, acs_decision:"PASS" } },
    phobert:    { outputs:{ phobert:{ mode:"phoBERT_siamese", normalizedAddress:"123 Lê Lợi, Phường Bến Thành, Quận 1, TP. Hồ Chí Minh", score:0.921, latencyMs:42 } },
                  meta:{ corpusSize:10000 } },
    mgte:       { outputs:{ mgte:{ mode:"mGTE_siamese", normalizedAddress:"123 Lê Lợi, Phường Bến Thành, Quận 1, Thành phố Hồ Chí Minh", score:0.954, latencyMs:38 } },
                  meta:{ corpusSize:10000 } },
    llm:        { outputs:{ llm:{ mode:"qwen2.5_llm", normalizedAddress:"123 Lê Lợi, Bến Thành, Quận 1, TP. Hồ Chí Minh", score:0.897, latencyMs:219 } },
                  meta:{ corpusSize:10000 } },
  };
  const merged = { ...defaults, ...overrides };

  window.fetch = async (url, opts) => {
    const key = ["prelabeler","phobert","mgte","llm"].find(k => url.includes(`model=${k}`));
    const cfg = merged[key];
    if (!cfg) throw new Error(`No mock for ${url}`);
    if (cfg._throw) throw new Error(cfg._throw);
    if (cfg._status && cfg._status >= 400)
      return { ok:false, status:cfg._status, json:async()=>({}) };
    return { ok:true, status:200, json:async()=>cfg };
  };
}

/* ══════════════════════════════════════════════════════════════════
   6. RUNNER — async-first, single-pass
   ══════════════════════════════════════════════════════════════════ */
(async () => {
  const t0 = performance.now();
  let totalPass = 0, totalFail = 0, totalCount = 0;
  const suiteEl = document.getElementById("suite");

  for (const group of _groups) {
    const groupEl = document.createElement("div");
    groupEl.className = "grp";

    const gTests = [];
    for (const { name, fn } of group.tests) {
      totalCount++;
      let status = "pass", err = "";
      try { await fn(); }
      catch(e) { status = "fail"; err = e.message; }
      gTests.push({ name, status, err });
      if (status === "pass") totalPass++;
      else totalFail++;

      // Live progress
      document.getElementById("s-pass").textContent  = totalPass;
      document.getElementById("s-fail").textContent  = totalFail;
      document.getElementById("s-total").textContent = totalCount;
      const pct = totalCount / _groups.reduce((s,g)=>s+g.tests.length,0) * 100;
      document.getElementById("progress-fill").style.width = pct + "%";
      if (totalFail > 0) document.getElementById("progress-fill").style.background = "#f87171";
      await new Promise(r => setTimeout(r, 0)); // yield to DOM
    }

    const gPass = gTests.filter(t => t.status === "pass").length;
    const gFail = gTests.filter(t => t.status === "fail").length;
    const titleEl = document.createElement("div");
    titleEl.className = "gtitle";
    titleEl.innerHTML = `${group.name}
      <span class="gcnt">
        <span class="pass">${gPass}✓</span>
        ${gFail ? `<span class="fail"> ${gFail}✗</span>` : ""}
      </span>`;
    groupEl.appendChild(titleEl);

    for (const t of gTests) {
      const row = document.createElement("div");
      row.className = "trow";
      const icon = t.status === "pass" ? "✅" : "❌";
      row.innerHTML = `<span class="ticon">${icon}</span>
        <div>
          <div class="tname">${t.name}</div>
          ${t.err ? `<div class="terr">${t.err}</div>` : ""}
        </div>`;
      groupEl.appendChild(row);
    }
    suiteEl.appendChild(groupEl);
  }

  const elapsed = Math.round(performance.now() - t0);
  document.getElementById("s-ms").textContent = elapsed + "ms";
  document.getElementById("progress-fill").style.width = "100%";
  if (totalFail === 0) {
    document.getElementById("s-fail").style.color = "#475569";
    document.getElementById("progress-fill").style.background = "#34d399";
  }

  console.log(`[Parser Tests] PASS=${totalPass} FAIL=${totalFail} TOTAL=${totalCount} (${elapsed}ms)`);
})();
</script>
