<!-- ══════ PAGE: BATCH PROCESSOR ══════ -->
<div class="page full-height-page" id="batch">
    <!-- BLOCK 1: Header + Input Controls -->
    <div class="page-header">
        <h2>Xử lý hàng loạt địa chỉ</h2>
        <p>Phân tích và chuẩn hóa địa chỉ theo lô với hiệu suất cao</p>
    </div>

    <!-- BLOCK 2: Configuration & Stats -->
    <div class="card mb-12">
        <div class="card-body" style="padding: 12px 18px;">
            <div style="display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start;">
                <!-- Config -->
                <div
                    style="flex: 2; min-width: 300px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 140px;">
                        <label class="form-label" style="margin-bottom: 4px; font-size: 11px;">Số lượng địa chỉ mỗi
                            lô</label>
                        <input type="text" class="form-input" id="batch-size" value="1,000" style="font-size: 13px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 160px;">
                        <label class="form-label" style="margin-bottom: 4px; font-size: 11px;">Chế độ xử lý</label>
                        <select class="form-input" id="batch-method" style="font-size: 13px;">
                            <option value="hybrid">Hybrid (Nhanh nhất)</option>
                            <option value="ner-only">Chỉ NER</option>
                            <option value="full-chain">Chuẩn hóa đầy đủ</option>
                        </select>
                    </div>
                    <button class="page-hero-btn" id="btn-batch-toggle" style="height: 34px; padding: 0 16px;">
                        <i class="fa-solid fa-play"></i> Bắt đầu xử lý
                    </button>
                </div>

                <!-- Stats -->
                <div style="flex: 1; min-width: 200px; display: flex; gap: 12px;">
                    <div class="stat-card batch-stat-card"
                        style="flex: 1; padding: 8px 12px; background: var(--bg-app);">
                        <div class="stat-label" style="font-size: 10px;">Đã xử lý</div>
                        <div class="stat-value batch-stat-value" id="batch-done" style="font-size: 18px;">0</div>
                    </div>
                    <div class="stat-card batch-stat-card"
                        style="flex: 1; padding: 8px 12px; background: var(--bg-app);">
                        <div class="stat-label" style="font-size: 10px;">Tốc độ</div>
                        <div class="stat-value batch-stat-value text-success" id="batch-throughput"
                            style="font-size: 18px;">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BLOCK 4: Progress + Console Output -->
    <div class="card" style="flex: 1; min-height: 0;">
        <div class="card-header">
            <span class="card-title">Tiến trình xử lý thời gian thực</span>
        </div>
        <div class="card-body"
            style="display: flex; flex-direction: column; min-height: 0; gap: 16px; padding: 16px 20px;">
            <!-- Progress Section -->
            <div class="batch-progress" style="margin-top: 0;">
                <div class="batch-progress-header">
                    <span class="batch-progress-label">Tiến độ tổng thể</span>
                    <span class="batch-progress-value" id="batch-progress-value">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Console Output Section -->
            <div class="batch-console-body" style="flex: 1; min-height: 0; display: flex; flex-direction: column;">
                <div
                    style="font-size: 11px; font-weight: 600; margin-bottom: 8px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px;">
                    Nhật ký xử lý</div>
                <div class="batch-log" id="batch-log" style="flex: 1; min-height: 0; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>
