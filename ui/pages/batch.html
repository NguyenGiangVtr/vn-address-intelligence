<!-- ══════ PAGE: BATCH PROCESSOR ══════ -->
<div class="page" id="batch">
    <div class="page-header">
        <h2>Batch Processor</h2>
        <p>Xử lý chuẩn hóa địa chỉ hàng loạt từ Queue (prq.address_cleansing_queue)</p>
    </div>

    <div class="content-grid sidebar-layout">
        <div class="card">
            <div class="card-header">
                <span class="card-title">Cấu hình Batch</span>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Kích thước Batch</label>
                    <input type="number" class="form-input" id="batch-size" value="1000">
                </div>
                <div class="form-group">
                    <label>Phương thức xử lý</label>
                    <select class="form-input" id="batch-method">
                        <option value="hybrid">Hybrid (Fastest)</option>
                        <option value="ner-only">NER only</option>
                        <option value="full-chain">Full Normalization Chain</option>
                    </select>
                </div>
                <div class="flex gap-12 mt-24">
                    <button class="btn btn-primary flex-1" id="btn-batch-start">
                        <i class="fa-solid fa-play"></i> Bắt đầu
                    </button>
                    <button class="btn btn-danger" id="btn-batch-stop">
                        <i class="fa-solid fa-stop"></i> Dừng
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Trạng thái thời gian thực</span>
            </div>
            <div class="card-body">
                <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="stat-card" style="padding: 12px; background: var(--bg-app);">
                        <div class="stat-label">Processed</div>
                        <div class="stat-value" id="batch-done" style="font-size: 20px;">0</div>
                    </div>
                    <div class="stat-card" style="padding: 12px; background: var(--bg-app);">
                        <div class="stat-label">Throughput</div>
                        <div class="stat-value" id="batch-throughput" style="font-size: 20px; color: var(--success);">0</div>
                    </div>
                </div>
                <div class="mt-16">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs text-tertiary">Progress</span>
                        <span class="text-xs font-bold">45%</span>
                    </div>
                    <div
                        style="height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden;">
                        <div style="height: 100%; width: 45%; background: var(--accent);"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-24">
        <div class="card-header">
            <span class="card-title">Console Output</span>
        </div>
        <div class="card-body">
            <div class="batch-log" id="batch-log">
                [SYSTEM] Ready to process batch...
                [SYSTEM] Awaiting user trigger.
            </div>
        </div>
    </div>
</div>
