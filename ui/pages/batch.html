<!-- ══════ PAGE: BATCH PROCESSOR ══════ -->
<div class="page full-height-page" id="batch">
    <div class="page-hero">
        <div class="page-hero-inner">
            <div class="page-hero-label">
                <div class="page-hero-dot"></div>
                Batch Processor
            </div>
            <div class="page-hero-actions">
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                    <label class="form-label" style="margin-bottom: 4px; font-size: 11px;">Kích thước Batch</label>
                    <input type="text" class="form-input" id="batch-size" value="1,000" style="font-size: 13px;">
                </div>
                <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 220px;">
                    <label class="form-label" style="margin-bottom: 4px; font-size: 11px;">Phương thức</label>
                    <select class="form-input" id="batch-method" style="font-size: 13px;">
                        <option value="hybrid">Hybrid (Fastest)</option>
                        <option value="ner-only">NER only</option>
                        <option value="full-chain">Full Normalization Chain</option>
                    </select>
                </div>
                <button class="page-hero-btn" id="btn-batch-start">
                    <i class="fa-solid fa-play"></i> Bắt đầu
                </button>
                <button class="page-hero-btn" id="btn-batch-stop" style="background: var(--danger); border-color: var(--danger);">
                    <i class="fa-solid fa-stop"></i> Dừng
                </button>
            </div>
        </div>
    </div>

    <div class="stats-grid batch-stats-grid">
        <div class="stat-card batch-stat-card">
            <div class="stat-label">Processed</div>
            <div class="stat-value batch-stat-value" id="batch-done">0</div>
        </div>
        <div class="stat-card batch-stat-card">
            <div class="stat-label">Throughput</div>
            <div class="stat-value batch-stat-value text-success" id="batch-throughput">0</div>
        </div>
    </div>

    <div class="card mt-12">
        <div class="card-header">
            <span class="card-title">Realtime Batch Status</span>
        </div>
        <div class="card-body" style="display:flex; flex-direction:column; min-height:0;">
            <div class="batch-progress">
                <div class="batch-progress-header">
                    <span class="batch-progress-label">Progress</span>
                    <span class="batch-progress-value">45%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 45%;"></div>
                </div>
            </div>
            <div class="batch-console-body" style="flex:1; min-height:0; margin-top:24px; display:flex; flex-direction:column;">
                <div class="card-header" style="padding: 0; border: none; margin-bottom: 12px;">
                    <span class="card-title">Console Output</span>
                </div>
                <div class="batch-log" id="batch-log" style="flex:1; min-height:0;">
                    [SYSTEM] Ready to process batch...
                    [SYSTEM] Awaiting user trigger.
                </div>
            </div>
        </div>
    </div>
</div>
