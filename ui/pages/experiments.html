<!-- ══════ PAGE: BENCHMARK EXPERIMENTS ══════ -->
<div class="page" id="experiments">
    <div class="page-header">
        <div class="flex justify-between items-center">
            <div>
                <h2>Benchmark Experiments</h2>
                <p>Đo hiệu năng giữa các model</p>
            </div>

            <div class="flex gap-12">
                <button class="btn btn-sm btn-ghost" id="btn-benchmark-refresh">
                    <i class="fa-solid fa-sync"></i> Refresh Tasks
                </button>
                <button class="btn btn-sm btn-primary" id="btn-run-benchmark" data-action="run-experiment"><i
                        class="fa-solid fa-play"></i> Run Full Benchmark</button>
            </div>
        </div>
    </div>

    <div class="stats-grid  mb-20">
        <div class="stat-card">
            <div class="stat-label">Tổng số Test Case</div>
            <div class="stat-value">5,000</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Độ chính xác trung bình</div>
            <div class="stat-value" style="color: var(--success)">94.2%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Thời gian phản hồi TB</div>
            <div class="stat-value">85ms</div>
        </div>
    </div>

    <div class="card ">
        <div class="card-header">
            <span class="card-title">Kết quả Benchmark chi tiết</span>
        </div>
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Model Approach</th>
                            <th>Accuracy</th>
                            <th>Precision</th>
                            <th>Recall</th>
                            <th>F1-Score</th>
                            <th>Latency</th>
                        </tr>
                    </thead>
                    <tbody id="benchmark-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
