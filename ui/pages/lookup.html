<!-- ══════ PAGE: ADMINISTRATIVE UNIT EVOLUTION ══════ -->
<div class="page full-height-page" id="lookup">
    <style>
        #lookup {
            --accent-senior: #4f46e5;
        }

        #lookup .page-header h2 {
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        #lookup .page-header p {
            color: var(--text-secondary);
        }

        /* Senior-friendly inputs */
        #lookup .form-label {
            color: var(--text-tertiary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #lookup .form-input {
            padding: 12px 16px;
            height: 48px;
            background: var(--bg-app);
            border: 1.5px solid var(--border-default);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            outline: none;
        }

        #lookup .input-wrapper .btn-clear-input {
            right: 32px;
            /* Move away from the native dropdown arrow */
            width: 32px;
            height: 32px;
            color: var(--text-tertiary);
        }

        #lookup .form-input.has-clear {
            padding-right: 64px;
            /* More padding for clear button + arrow */
        }

        #lookup .search-box {
            display: flex;
            align-items: stretch;
            height: 52px;
            border-radius: var(--radius-lg);
            background: var(--bg-app);
            border: 1.5px solid var(--border-default);
            margin-top: 20px;
            overflow: hidden;
            transition: all var(--transition);
        }

        #lookup .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        #lookup .search-box .search-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            color: var(--text-tertiary);
        }

        #lookup .search-box .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0;
            color: var(--text-primary);
            outline: none;
        }

        #lookup .search-box .btn-primary {
            height: 100%;
            border-radius: 0;
            padding: 0 32px;
            background: var(--accent-senior);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #lookup .unit-details-card {
            background: linear-gradient(135deg, var(--bg-surface), var(--bg-elevated));
            border: 1px solid var(--border-default);
            border-left: 4px solid var(--accent);
            border-radius: var(--radius-lg);
            padding: 12px;
        }

        .unit-details-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            width: 100%;
        }

        .unit-main-info {
            flex: 0 0 240px;
        }

        .unit-name-text {
            color: var(--accent);
        }

        .unit-meta-text {
            color: var(--text-tertiary);
        }

        .unit-stats-group {
            display: flex;
            gap: 32px;
            padding: 0 24px;
            border-left: 1px solid var(--border-subtle);
            border-right: 1px solid var(--border-subtle);
        }

        .unit-stat-item {
            text-align: center;
        }

        .unit-stat-label {
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .unit-stat-value {
            color: var(--text-primary);
        }

        .unit-legal-info {
            flex: 1;
            min-width: 200px;
        }

        .unit-decision-text {
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 992px) {
            .unit-stats-group {
                border-right: none;
                padding-right: 0;
            }
        }

        @media (max-width: 768px) {
            .unit-details-flex {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .unit-main-info,
            .unit-stats-group,
            .unit-legal-info {
                flex: 1;
                width: 100%;
                padding: 0;
                border: none;
            }

            .unit-stats-group {
                justify-content: flex-start;
                gap: 40px;
            }
        }

        #lookup .detail-label {
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        #lookup .detail-value {
            color: var(--text-primary);
        }

        /* Results Table Refinements */
        #lookup .table-container thead th {
            background: var(--bg-app);
            padding: 14px;
        }

        #lookup .table-container tbody td {
            padding: 16px 14px;
            vertical-align: middle;
        }

        /* Responsive / Mobile Optimization */
        @media (max-width: 768px) {
            #lookup .card-body {
                padding: 16px;
            }

            #lookup .dm-filter-toolbar .card-body {
                flex-direction: column;
                align-items: stretch;
            }

            #lookup .search-box {
                flex-direction: column;
                height: auto;
                gap: 8px;
                border: none;
                background: transparent;
                position: relative;
            }

            #lookup .search-box .search-icon {
                position: absolute;
                left: 0;
                top: 0;
                height: 48px;
                width: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2;
            }

            #lookup .search-box .search-input {
                background: var(--bg-app);
                border: 1.5px solid var(--border-default);
                border-radius: var(--radius-md);
                height: 48px;
                min-height: 48px;
                padding: 0 16px 0 40px;
                width: 100%;
            }

            #lookup .search-box .btn-primary {
                height: 48px;
                border-radius: var(--radius-md);
                width: 100%;
                justify-content: center;
            }

            /* Transform Table to Cards for mobile */
            #lookup .dm-page-main {
                overflow: visible !important;
                flex: none !important;
            }

            #lookup .lookup-results-table {
                overflow: visible !important;
                flex: none !important;
                max-height: none !important;
            }

            #lookup .dm-page-main>.card {
                overflow: visible !important;
                flex: none !important;
                height: auto !important;
            }

            #lookup .lookup-results-table thead {
                display: none;
            }

            #lookup .lookup-results-table table,
            #lookup .lookup-results-table tbody,
            #lookup .lookup-results-table tr,
            #lookup .lookup-results-table td {
                display: block;
                width: 100%;
            }

            #lookup .lookup-results-table tr {
                background: var(--bg-surface);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-lg);
                margin-bottom: 12px;
                padding: 16px;
            }

            #lookup .lookup-results-table td {
                padding: 4px 0;
                border: none;
            }

            #lookup .lookup-results-table td::before {
                content: attr(data-label);
                display: block;
                color: var(--text-tertiary);
                text-transform: uppercase;
                margin-bottom: 2px;
            }
        }
    </style>

    <div class="page-header">
        <h2>Chuyển đổi ĐVHC cũ - mới</h2>
        <p>Thư viện tra cứu lịch sử sáp nhập, chia tách và đổi tên các cấp ĐVHC Việt Nam</p>
    </div>

    <div id="lookup-filter-container"></div>

    <div class="dm-page-main flex flex-column gap-16 overflow-hidden flex-1">
        <!-- Details Card -->
        <div class="unit-details-card" id="unit-details-panel">
            <div class="flex items-center justify-center gap-16 text-tertiary"
                style="min-height: 60px; text-align: center;">
                <i class="fa-solid fa-lightbulb" style="color: var(--warning);"></i>
                <p class="m-0">Vui lòng chọn một đơn vị để xem chi tiết lịch sử và mã hành
                    chính.</p>
            </div>
        </div>

        <!-- Results Section -->
        <div class="card flex flex-column overflow-hidden flex-1" style="min-height: 0;">
            <div class="card-header"
                style="background: var(--bg-elevated); border-bottom: 2px solid var(--accent); padding: 12px 16px;">
                <div class="flex items-center justify-between w-full">
                    <span class="card-title">
                        <i class="fa-solid fa-list-check mr-8"></i> Kết quả
                    </span>
                    <span class="badge accent" id="mapping-result-count" style="padding: 4px 12px;">0
                        bản
                        ghi</span>
                </div>
            </div>
            <div class="table-container lookup-results-table flex-1">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 200px;">ĐVHC Cũ</th>
                            <th class="text-center" style="width: 50px;"></th>
                            <th style="width: 200px;">ĐVHC Mới</th>
                            <th>Diễn biến & Nghị quyết</th>
                            <th style="width: 130px;">Ngày áp dụng</th>
                        </tr>
                    </thead>
                    <tbody id="mapping-results-table">
                        <tr>
                            <td colspan="5" class="text-center text-tertiary" style="padding: 80px">
                                <i class="fa-solid fa-magnifying-glass-location mb-16"
                                    style="display: block; opacity: 0.3;"></i>
                                <span>Sử dụng bộ lọc phía trên để bắt đầu</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
