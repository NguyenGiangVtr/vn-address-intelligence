<!-- ══════ PAGE: OSM ENRICHMENT ══════ -->
<div class="page" id="osm-enrichment">
    <div class="page-header">
        <h2>OSM Enrichment</h2>
        <p>Crawl và đồng bộ dữ liệu địa lý từ OpenStreetMap (Buildings, Streets)</p>
    </div>

    <div class="card mb-20">
        <div class="card-header">
            <span class="card-title">Crawler Configuration</span>
        </div>
        <div class="card-body" style="display:flex; gap:20px; flex-wrap:wrap; min-height:0;">
            <div style="flex:1 1 320px; min-width:280px;">
                <div class="form-group">
                    <label>Giới hạn số Tỉnh/Thành</label>
                    <input type="number" class="form-input" id="osm-limit-provinces" value="63">
                </div>
                <div class="form-group">
                    <label>Target Total Entities</label>
                    <input type="text" class="form-input" id="osm-target-total" value="5,000,000">
                </div>
                <div class="flex gap-12 mt-24">
                    <button class="btn btn-primary flex-1" id="btn-osm-run">
                        <i class="fa-solid fa-play"></i> Bắt đầu Crawler
                    </button>
                    <button class="btn btn-ghost" id="btn-osm-preview-counts">
                        <i class="fa-solid fa-eye"></i> Preview
                    </button>
                </div>
            </div>
            <div style="flex:1 1 240px; min-width:240px; display:flex; flex-direction:column; gap:12px;">
                <div class="stat-card" style="padding: 16px; background: var(--bg-app);">
                    <div class="stat-label">Total Entities</div>
                    <div class="stat-value" id="osm-total-count" style="font-size: 20px;">615,547</div>
                </div>
                <div class="stat-card" style="padding: 16px; background: var(--bg-app);">
                    <div class="stat-label">Last Updated</div>
                    <div class="stat-value" id="osm-last-update"
                        style="font-size: 14px; color: var(--text-tertiary); margin-top: 4px;">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">OSM Job Log</span>
            <div class="badge-outline" id="osm-job-status">IDLE</div>
        </div>
        <div class="card-body">
            <div class="batch-log" id="osm-job-log">
                [SYSTEM] Awaiting crawler start...
            </div>
        </div>
    </div>
</div>
