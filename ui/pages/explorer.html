<!-- ══════ PAGE: DATA EXPLORER ══════ -->
<div class="page" id="explorer">
    <div class="page-header">
        <h2>Data Explorer</h2>
        <p>Khám phá và truy vấn dữ liệu từ prq.address_cleansing_queue</p>
    </div>

    <!-- Filter Toolbar -->
    <div id="explorer-filter-container"></div>

    <div class="card">
        <div class="card-header">
            <span class="card-title"><i class="fa-solid fa-database mr-8"></i> Hàng đợi xử lý địa chỉ</span>
            <span class="badge info" id="explorer-count-badge">—</span>
        </div>
        <div class="card-body" style="padding:0">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Raw Address</th>
                            <th>Ward</th>
                            <th>District</th>
                            <th>Province</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="explorer-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
            <div
                id="explorer-pager"
                class="flex items-center justify-between gap-16"
                style="padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap"
            >
                <span id="explorer-paging-meta" class="text-tertiary text-xs"></span>
                <div class="flex items-center gap-8">
                    <button type="button" class="btn btn-sm btn-outline" id="explorer-page-prev" aria-label="Trang trước">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <span id="explorer-page-indicator" class="text-sm text-secondary"></span>
                    <button type="button" class="btn btn-sm btn-outline" id="explorer-page-next" aria-label="Trang sau">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
